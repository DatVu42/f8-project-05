<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Embed fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <title>F8 Project 05</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/grid.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="inner">Header</div>
      </header>

      <main>
        <!-- Hero -->
        <section class="hero">
          <div class="row">
            <div class="col-lg-6 col-md-6 col-12">
              <section class="inner">Hero info</section>
            </div>

            <div class="col-lg-5 offset-lg-1 col-md-6 col-12">
              <div class="inner">Hero media</div>
            </div>
          </div>
        </section>

        <!-- Wallet 1 -->
        <section class="wallet-1">
          <div class="row">
            <div class="col-lg-5 col-md-6 col-12">
              <div class="inner">Wallet 1 - Left</div>
            </div>

            <div class="col-lg-5 offset-lg-2 col-md-6 col-12">
              <div class="inner">Wallet 1 - Right</div>
            </div>
          </div>
        </section>

        <!-- Wallet 2 -->
        <section class="wallet-2">
          <div class="row">
            <div class="col-lg-5 col-md-6 col-12">
              <div class="inner">Wallet 2 - Left</div>
            </div>

            <div class="col-lg-6 offset-lg-1 col-md-6 col-12">
              <div class="inner">Wallet 2 - Right</div>
            </div>
          </div>
        </section>

        <!-- Wallet 3 -->
        <section class="wallet-3">
          <div class="row">
            <div class="col-lg-6 col-md-6 col-12">
              <div class="inner">Wallet 3 - Left</div>
            </div>
            <div class="col-lg-5 offset-lg-1 col-md-6 col-12">
              <div class="inner">Wallet 3 - Right</div>
            </div>
          </div>
        </section>

        <!-- Client -->
        <section class="client">
          <div class="row">
            <div class="col">
              <div class="inner">What Clients Says</div>
            </div>
          </div>

          <div class="row row-cols-md-2 row-cols-1">
            <div class="col">
              <div class="inner">Item 1</div>
            </div>
            <div class="col">
              <div class="inner">Item 2</div>
            </div>
          </div>
        </section>

        <!-- Blog -->
        <section class="blog">
          <div class="row">
            <div class="col">
              <div class="inner">Left - Right</div>
            </div>
          </div>

          <div class="row row-cols-md-2 row-cols-1">
            <div class="col">
              <div class="inner">Item 1</div>
            </div>
            <div class="col">
              <div class="inner">Item 2</div>
            </div>
            <div class="col">
              <div class="inner">Item 3</div>
            </div>
            <div class="col">
              <div class="inner">Item 4</div>
            </div>
          </div>
        </section>

        <!-- App -->
        <section class="app">
          <div class="row">
            <div class="col">
              <div class="inner">Download the Apps</div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <!-- End .container -->

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="inner">Footer</div>
      </div>
    </footer>
  </body>
</html>
